<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asset Inventory</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
      <span class="navbar-brand fw-bold">🖥️ Asset Inventory</span>
      <span id="health-badge" class="badge bg-secondary">Vérification...</span>
    </div>
  </nav>

  <div class="container">

    <!-- Formulaire d'ajout -->
    <div class="card mb-4">
      <div class="card-header fw-bold">Ajouter un asset</div>
      <div class="card-body">
        <div class="row g-3">
          <div class="col-md-3">
            <input id="name" type="text" class="form-control" placeholder="Nom *">
          </div>
          <div class="col-md-3">
            <input id="asset_type" type="text" class="form-control" placeholder="Type *">
          </div>
          <div class="col-md-2">
            <select id="status" class="form-select">
              <option value="active">Active</option>
              <option value="expired">Expired</option>
              <option value="decommissioned">Decommissioned</option>
            </select>
          </div>
          <div class="col-md-2">
            <input id="expiry_date" type="date" class="form-control">
          </div>
          <div class="col-md-2">
            <button onclick="createAsset()" class="btn btn-primary w-100">Ajouter</button>
          </div>
        </div>
        <div id="error-msg" class="text-danger mt-2 d-none"></div>
      </div>
    </div>

    <!-- Tableau des assets -->
    <div class="card">
      <div class="card-header fw-bold">Liste des assets</div>
      <div class="card-body p-0">
        <table class="table table-striped mb-0">
          <thead class="table-dark">
            <tr>
              <th>ID</th>
              <th>Nom</th>
              <th>Type</th>
              <th>Statut</th>
              <th>Expiration</th>
              <th>Créé le</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="assets-table"></tbody>
        </table>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>

    // ---- Credentials Basic Auth ----
    const CREDENTIALS = btoa("admin:admin");

    // ---- Badge de santé ----
    async function checkHealth() {
      try {
        const res = await fetch("/health");
        const data = await res.json();
        const badge = document.getElementById("health-badge");
        if (data.status === "ok") {
          badge.className = "badge bg-success";
          badge.textContent = "✓ Système opérationnel";
        } else {
          badge.className = "badge bg-warning";
          badge.textContent = "⚠ Système dégradé";
        }
      } catch {
        const badge = document.getElementById("health-badge");
        badge.className = "badge bg-danger";
        badge.textContent = "✗ Système indisponible";
      }
    }

    // ---- Badge de statut coloré ----
    function statusBadge(status) {
      const colors = {
        active: "success",
        expired: "danger",
        decommissioned: "secondary"
      };
      const color = colors[status] || "secondary";
      return `<span class="badge bg-${color}">${status}</span>`;
    }

    // ---- Charger et afficher les assets ----
    async function loadAssets() {
      const res = await fetch("/assets");
      const assets = await res.json();
      const tbody = document.getElementById("assets-table");
      if (assets.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7" class="text-center text-muted py-3">Aucun asset enregistré</td></tr>`;
        return;
      }
      tbody.innerHTML = assets.map(a => `
        <tr>
          <td>${a.id}</td>
          <td>${a.name}</td>
          <td>${a.asset_type}</td>
          <td>${statusBadge(a.status)}</td>
          <td>${a.expiry_date || "—"}</td>
          <td>${a.created_at}</td>
          <td>
            <button onclick="deleteAsset(${a.id})" class="btn btn-danger btn-sm">Supprimer</button>
          </td>
        </tr>
      `).join("");
    }

    // ---- Créer un asset ----
    async function createAsset() {
      const name = document.getElementById("name").value.trim();
      const asset_type = document.getElementById("asset_type").value.trim();
      const status = document.getElementById("status").value;
      const expiry_date = document.getElementById("expiry_date").value || null;
      const errorMsg = document.getElementById("error-msg");

      if (!name || !asset_type) {
        errorMsg.textContent = "Le nom et le type sont obligatoires.";
        errorMsg.classList.remove("d-none");
        return;
      }
      errorMsg.classList.add("d-none");

      const res = await fetch("/assets", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Basic ${CREDENTIALS}`
        },
        body: JSON.stringify({ name, asset_type, status, expiry_date })
      });

      if (res.status === 201) {
        document.getElementById("name").value = "";
        document.getElementById("asset_type").value = "";
        document.getElementById("expiry_date").value = "";
        loadAssets();
      } else {
        errorMsg.textContent = "Erreur lors de la création.";
        errorMsg.classList.remove("d-none");
      }
    }

    // ---- Supprimer un asset ----
    async function deleteAsset(id) {
      if (!confirm("Supprimer cet asset ?")) return;
      await fetch(`/assets/${id}`, {
        method: "DELETE",
        headers: { "Authorization": `Basic ${CREDENTIALS}` }
      });
      loadAssets();
    }

    // ---- Initialisation ----
    checkHealth();
    loadAssets();

  </script>
</body>
</html>
